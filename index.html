<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utilities</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- DevIcons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css"
    />
    <style>
      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        background-color: #f5f5f5;
      }

      /* Sidebar */
      .sidebar {
        width: 250px;
        background: #2c3e50;
        color: #ecf0f1;
        padding: 20px 0;
        overflow-y: auto;
        box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      }

      .sidebar-header {
        padding: 0 20px 20px;
        border-bottom: 1px solid #34495e;
        margin-bottom: 20px;
      }

      .sidebar-title {
        font-size: 18px;
        font-weight: 700;
        color: #0d6efd;
      }

      .category {
        margin-bottom: 5px;
      }

      .category-toggle {
        width: 100%;
        padding: 12px 20px;
        background: none;
        border: none;
        color: #ecf0f1;
        text-align: left;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.2s;
      }

      .category-toggle:hover {
        background: rgba(13, 110, 253, 0.1);
      }

      .category-toggle.active {
        background: rgba(13, 110, 253, 0.2);
        color: #0d6efd;
      }

      .category-arrow {
        font-size: 12px;
        transition: transform 0.3s;
      }

      .category-arrow.open {
        transform: rotate(90deg);
      }

      .utilities-list {
        display: none;
        padding: 5px 0;
        background: rgba(0, 0, 0, 0.1);
      }

      .utilities-list.open {
        display: block;
      }

      .utility-item {
        padding: 10px 40px;
        color: #bdc3c7;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
        border-left: 3px solid transparent;
      }

      .utility-item:hover {
        background: rgba(13, 110, 253, 0.15);
        color: #0d6efd;
        border-left-color: #0d6efd;
      }

      .utility-item.active {
        background: rgba(13, 110, 253, 0.25);
        color: #0d6efd;
        border-left-color: #0d6efd;
        font-weight: 600;
      }

      /* Icon Styling */
      .category-toggle i {
        margin-right: 8px;
        font-size: 16px;
        width: 20px;
        text-align: center;
      }

      .sidebar-title i {
        margin-right: 8px;
        font-size: 16px;
      }

      #utilityName i {
        margin-right: 8px;
      }

      .welcome-icon {
        margin-bottom: 20px;
      }

      /* Main Content */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #fff;
      }

      .top-bar {
        background: #fff;
        border-bottom: 1px solid #dee2e6;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .utility-name {
        font-size: 20px;
        font-weight: 700;
        color: #2c3e50;
      }

      .content-area {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
      }

      .utility-view {
        display: none;
      }

      .utility-view.active {
        display: block;
      }

      /* Welcome Screen */
      .welcome-screen {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: #999;
        height: 100%;
      }

      .welcome-icon {
        font-size: 60px;
        margin-bottom: 20px;
      }

      .welcome-text {
        font-size: 18px;
        font-weight: 600;
      }

      /* Code Blocks */
      .code-blocks-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 20px;
      }

      .code-preview {
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: "Consolas", "Monaco", monospace;
        font-size: 12px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        max-height: 150px;
        overflow-y: auto;
        padding: 12px;
        border-radius: 4px;
      }

      textarea {
        font-family: "Consolas", "Monaco", monospace;
        font-size: 13px;
      }

      .stat-value {
        font-size: 20px;
        font-weight: 700;
        color: #0d6efd;
      }

      .stat-label {
        font-size: 12px;
        color: #6c757d;
        margin-top: 5px;
      }

      .copy-feedback {
        color: #27ae60;
        font-size: 12px;
        font-weight: 600;
        display: none;
        margin-left: 10px;
      }

      .copy-feedback.show {
        display: inline;
      }

      .code-copy-feedback {
        color: #27ae60;
        font-size: 11px;
        font-weight: 600;
        display: none;
        align-self: center;
      }

      .code-copy-feedback.show {
        display: inline;
      }

      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          max-height: 200px;
          display: flex;
          overflow-x: auto;
        }

        .category {
          flex-shrink: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title"><i class="fas fa-cog"></i> Utilities</div>
      </div>

      <!-- SQL Category -->
      <div class="category">
        <button class="category-toggle" onclick="toggleCategory(this)">
          <i class="fas fa-database"></i> SQL
          <span class="category-arrow">›</span>
        </button>
        <div class="utilities-list">
          <div
            class="utility-item"
            onclick="switchUtility('in-generator', this)"
            style="cursor: pointer"
          >
            IN Statement Generator
          </div>
        </div>
      </div>

      <!-- .NET Category -->
      <div class="category">
        <button class="category-toggle" onclick="toggleCategory(this)">
          <i class="devicon-csharp-plain"></i> .NET
          <span class="category-arrow">›</span>
        </button>
        <div class="utilities-list">
          <div class="utility-item">Coming Soon</div>
        </div>
      </div>

      <!-- Angular Category -->
      <div class="category">
        <button class="category-toggle" onclick="toggleCategory(this)">
          <i class="fab fa-angular"></i> Angular
          <span class="category-arrow">›</span>
        </button>
        <div class="utilities-list">
          <div class="utility-item">Coming Soon</div>
        </div>
      </div>

      <!-- General Category -->
      <div class="category">
        <button class="category-toggle" onclick="toggleCategory(this)">
          <i class="fas fa-star"></i> General
          <span class="category-arrow">›</span>
        </button>
        <div class="utilities-list">
          <div class="utility-item">Coming Soon</div>
        </div>
      </div>

      <!-- Code Blocks Category -->
      <div class="category">
        <button class="category-toggle" onclick="toggleCategory(this)">
          <i class="fas fa-code"></i> Code Blocks
          <span class="category-arrow">›</span>
        </button>
        <div class="utilities-list">
          <div
            class="utility-item"
            onclick="switchUtility('code-blocks', this)"
          >
            Frequently Used
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main">
      <div class="top-bar">
        <div class="utility-name" id="utilityName">Select a Utility</div>
        <div style="color: #999; font-size: 12px">
          Utilities by Sameertanveer23
        </div>
      </div>

      <div class="content-area">
        <!-- Welcome Screen -->
        <div class="utility-view active" id="welcome">
          <div class="welcome-screen">
            <div class="welcome-icon">
              <i class="fas fa-cog fa-4x text-muted"></i>
            </div>
            <div class="welcome-text">
              Select a utility from the sidebar to get started
            </div>
          </div>
        </div>

        <!-- Frequently Used Code Blocks -->
        <div class="utility-view" id="code-blocks">
          <div class="utility-container">
            <div class="code-blocks-grid" id="codeBlocksContainer">
              <!-- Code blocks will be generated here by JavaScript -->
            </div>
          </div>
        </div>

        <!-- SQL IN Generator -->
        <div class="utility-view" id="in-generator">
          <div class="utility-container">
            <div class="row g-4 mb-4">
              <div class="col-lg-6">
                <div class="card border-0 bg-light">
                  <div class="card-body">
                    <h5 class="card-title mb-3">Input</h5>
                    <div class="mb-3">
                      <label for="tableName" class="form-label"
                        >Table Name</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="tableName"
                        placeholder="e.g., Users"
                      />
                    </div>
                    <div class="mb-3">
                      <label for="columnName" class="form-label"
                        >Column Name</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="columnName"
                        placeholder="e.g., UserId"
                      />
                    </div>
                    <div class="mb-3">
                      <label for="idFormat" class="form-label">ID Format</label>
                      <select class="form-select" id="idFormat">
                        <option value="single-quote">Single Quote</option>
                        <option value="double-quote">Double Quote</option>
                        <option value="no-quote">No Quote</option>
                      </select>
                    </div>
                    <div class="mb-3">
                      <label for="rawIds" class="form-label"
                        >IDs (one per line)</label
                      >
                      <textarea
                        class="form-control"
                        id="rawIds"
                        rows="8"
                        placeholder="Paste your IDs here, one per line..."
                      ></textarea>
                    </div>
                    <div class="d-flex gap-2">
                      <button
                        class="btn btn-primary"
                        onclick="generateInQuery()"
                      >
                        Generate Query
                      </button>
                      <button
                        class="btn btn-secondary"
                        onclick="clearInInputs()"
                      >
                        Clear
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-lg-6">
                <div class="card border-0 bg-light">
                  <div class="card-body">
                    <h5 class="card-title mb-3">Output</h5>
                    <div class="mb-3">
                      <label for="outputQuery" class="form-label"
                        >Generated Query</label
                      >
                      <textarea
                        class="form-control"
                        id="outputQuery"
                        rows="8"
                        readonly
                      ></textarea>
                    </div>
                    <div class="d-flex gap-2 mb-3">
                      <button
                        class="btn btn-primary flex-grow-1"
                        onclick="copyInQuery()"
                      >
                        Copy to Clipboard
                      </button>
                      <button
                        class="btn btn-secondary flex-grow-1"
                        onclick="downloadInQuery()"
                      >
                        Download
                      </button>
                      <span
                        class="copy-feedback align-self-center ms-2"
                        id="copyFeedback"
                        ><i class="fas fa-check text-success"></i> Copied!</span
                      >
                    </div>
                    <div class="row g-3" id="stats" style="display: none">
                      <div class="col-6">
                        <div
                          class="bg-secondary-subtle p-3 rounded text-center"
                        >
                          <div class="stat-value" id="idCount">0</div>
                          <div class="stat-label">Total IDs</div>
                        </div>
                      </div>
                      <div class="col-6">
                        <div
                          class="bg-secondary-subtle p-3 rounded text-center"
                        >
                          <div class="stat-value" id="charCount">0</div>
                          <div class="stat-label">Characters</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
