<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>.NET Utilities</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #3b82f6;
        --accent: #f59e0b;
        --dark: #0f172a;
        --darker: #020617;
        --gray: #64748b;
        --border: #e2e8f0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, var(--darker) 0%, #1a1f35 100%);
        color: #e2e8f0;
        line-height: 1.6;
        min-height: 100vh;
      }

      header {
        background: rgba(2, 6, 23, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        padding: 1.5rem 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary), #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .back-link {
        color: var(--gray);
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .back-link:hover {
        color: var(--primary);
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 3rem 2rem;
      }

      .category-header {
        margin-bottom: 5rem;
      }

      .category-title {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        color: #f1f5f9;
      }

      .category-description {
        color: var(--gray);
        font-size: 1.1rem;
        margin-bottom: 2rem;
      }

      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        background: linear-gradient(
          135deg,
          rgba(30, 41, 59, 0.6),
          rgba(15, 23, 42, 0.6)
        );
        border: 1px solid rgba(226, 232, 240, 0.1);
        border-radius: 12px;
        backdrop-filter: blur(10px);
      }

      .empty-state-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }

      .empty-state h3 {
        font-size: 1.5rem;
        color: #cbd5e1;
        margin-bottom: 0.75rem;
      }

      .empty-state p {
        color: var(--gray);
        font-size: 1rem;
        margin-bottom: 2rem;
      }

      .cta-button {
        display: inline-block;
        background: linear-gradient(135deg, var(--primary), #1e40af);
        color: white;
        padding: 12px 32px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
      }

      .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
      }

      footer {
        margin-top: 5rem;
        padding: 2rem;
        border-top: 1px solid var(--border);
        text-align: center;
        color: var(--gray);
        font-size: 0.9rem;
      }

      @media (max-width: 768px) {
        .category-title {
          font-size: 1.8rem;
        }

        .empty-state {
          padding: 2rem;
        }

        .empty-state-icon {
          font-size: 3rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-content">
        <div class="logo">⚙️ Utilities</div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
      </div>
    </header>

    <div class="container">
      <div class="category-header">
        <h1 class="category-title">🔷 .NET Utilities</h1>
        <p class="category-description">
          Tools and utilities for .NET development and application building
        </p>
      </div>

      <div class="empty-state">
        <div class="empty-state-icon">🚀</div>
        <h3>Coming Soon</h3>
        <p>
          New .NET utilities are being developed. Check back later for exciting
          tools!
        </p>
        <a href="../../index.html" class="cta-button">← Back to Home</a>
      </div>
    </div>

    <footer>
      <p>
        © 2026 Utilities by Sameertanveer23. Built with ❤️ for productivity.
      </p>
    </footer>
  </body>
</html>
